name: Export Weekly Leaderboard

on:
  # Runs Monday 00:30 UTC (30min after freeze_current_week cron)
  schedule:
    - cron: '30 0 * * 1'
  # Manual trigger
  workflow_dispatch:
    inputs:
      weeks:
        description: 'Comma-separated week numbers to export (empty = latest frozen)'
        required: false

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Export weekly leaderboard
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.weeks }}" ]; then
            node scripts/export-weekly-lb.mjs --weeks=${{ github.event.inputs.weeks }}
          else
            node scripts/export-weekly-lb.mjs
          fi

      - name: Commit and push exported data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/leaderboard/
          git diff --staged --quiet || {
            git commit -m "Export weekly LB data $(date -u +%Y-%m-%d)"
            git push
          }
